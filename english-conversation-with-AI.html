<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI英会話プロンプトジェネレーター</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; background: #f9f9f9; color: #333; }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        select, input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { background: #3498db; color: #fff; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        button:hover { background: #2980b9; }
        .result-area { margin-top: 30px; display: none; }
        textarea { width: 100%; height: 300px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; background: #fff; font-family: monospace; font-size: 14px; box-sizing: border-box; }
        .copy-btn { background: #2ecc71; margin-top: 10px; }
        .copy-btn:hover { background: #27ae60; }
        .instruction { background: #e8f4f8; border-left: 4px solid #3498db; padding: 15px; margin-bottom: 20px; border-radius: 0 4px 4px 0; }
    </style>
</head>
<body>

    <h1>AI英会話プロンプトジェネレーター</h1>
    <div class="instruction">
        <p>条件を選択して「プロンプトを生成」を押し、コピーしたテキストをChatGPTやClaudeなどのAIに貼り付けて英会話を始めてください。会話を終えたい時は <strong>[Finish]</strong> と入力すると、日本語でフィードバックがもらえます。</p>
    </div>

    <div class="form-group">
        <label for="level">1. 英語レベル (English Level):</label>
        <select id="level">
            <option value="Beginner (Clear, simple words, CEFR A2)">初級 (簡単な単語と短い文章 / CEFR A2レベル)</option>
            <option value="Intermediate (Natural yet plain and clear, CEFR B1/B2)" selected>中級 (平易で伝わりやすいグローバル英語 / CEFR B1-B2レベル)</option>
            <option value="Advanced (Academic/Professional discussion, CEFR C1)">上級 (学術的・論理的なディスカッション / CEFR C1レベル)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="topic">2. トピック (Topic):</label>
        <select id="topic" onchange="toggleCustomTopic()">
            <option value="Casual small talk about daily life and hobbies">日常会話・趣味（雑談）</option>
            <option value="Chatting with a colleague during a coffee break at an international conference">国際学会の休憩時間での同僚との立ち話</option>
            <option value="Discussing current academic trends and research interests">最近の学術的トレンドや関心のある研究について</option>
            <option value="Shopping, ordering food, and asking for directions while traveling">旅行先での買い物・注文・道のり</option>
            <option value="Custom">自由入力（以下にトピックを入力）</option>
        </select>
    </div>

    <div class="form-group" id="custom-topic-group" style="display: none;">
        <label for="custom-topic">自由入力トピック (英語または日本語):</label>
        <input type="text" id="custom-topic" placeholder="例: 人工知能が教育に与える影響について（Discussion on AI in education）">
    </div>

    <div class="form-group">
        <label for="persona">3. AIのペルソナ・話し方 (Persona & Voice):</label>
        <select id="persona">
            <option value="A friendly colleague with clear, standard English accent.">親しみやすい同僚（標準的でクリアな英語）</option>
            <option value="A supportive and polite university professor.">親切で丁寧な大学教授</option>
            <option value="A relaxed and chatty friend.">リラックスした話し好きの友人</option>
        </select>
    </div>

    <button type="button" onclick="generatePrompt()">プロンプトを生成する</button>

    <div class="result-area" id="result-area">
        <h2>生成されたプロンプト</h2>
        <textarea id="prompt-output" readonly></textarea>
        <button type="button" class="copy-btn" onclick="copyPrompt()">プロンプトをクリップボードにコピー</button>
    </div>

    <script>
        function toggleCustomTopic() {
            const topicSelect = document.getElementById('topic');
            const customGroup = document.getElementById('custom-topic-group');
            if (topicSelect.value === 'Custom') {
                customGroup.style.display = 'block';
            } else {
                customGroup.style.display = 'none';
            }
        }

        function generatePrompt() {
            const level = document.getElementById('level').value;
            let topic = document.getElementById('topic').value;
            if (topic === 'Custom') {
                topic = document.getElementById('custom-topic').value || 'A flexible and interesting topic';
            }
            const persona = document.getElementById('persona').value;

            const promptTemplate = `You are an excellent AI English conversation partner. Please roleplay based on the following settings to help me practice my speaking and interaction skills.

### Settings
- **Your Persona**: ${persona}
- **My English Level**: ${level}
- **Topic**: ${topic}
- **Target English Type**: Plain, clear, and globally accessible English (avoid overly regional idioms or excessively complex vocabulary; focus on practical, effective communication).

### Strict Rules for the Conversation
1. **Never speak too much**: Limit your response to a maximum of 2 or 3 sentences. Keep it concise so I have more opportunities to speak.
2. **One turn, one question**: Always end your response with exactly one natural question to pass the turn back to me.
3. **No corrections during the chat**: Do not correct my grammar or vocabulary while the conversation is ongoing. Just keep the chat flowing naturally.
4. **Language**: Speak ONLY in English during the conversation.

### How to Finish & Feedback
- The conversation continues until I type "**[Finish]**".
- When I type "[Finish]", stop the roleplay immediately and provide feedback in **Japanese** based on the following format:

---
### 🛠️ フィードバック (Feedback)
1. **総評**: 今回の会話のキャッチボールに対するポジティブなフィードバック。
2. **ブラッシュアップ表現**: 私の発言の中で、より自然で、かつ「平易で伝わりやすい（国際学会や日常会話で重宝する）」表現への修正案（元の文 → 改善案 ＋ 簡単な日本語解説）。
3. **覚えておくと便利な表現**: 今回のトピックに関連して、同僚との会話や学会の立ち話でそのまま使える便利なフレーズ・語彙（3〜5個、日本語訳付き）。
---

If you understand, please start the conversation now by greeting me naturally based on your persona and the topic, ending with your first question.`;

            document.getElementById('prompt-output').value = promptTemplate;
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' });
        }

        function copyPrompt() {
            const copyText = document.getElementById('prompt-output');
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand('copy');
            alert('プロンプトをコピーしました！AIに貼り付けて会話を始めてください。');
        }
    </script>
</body>
</html>
