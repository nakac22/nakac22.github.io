<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文分析＋言語トピック生成ツール（コーパス強化版）</title>

<style>
body { font-family: sans-serif; padding: 15px; max-width: 900px; margin: auto; }
textarea, select { width: 100%; margin-bottom: 12px; padding: 10px; font-size: 16px; }
button { width: 100%; padding: 15px; font-size: 18px; margin-top: 5px; }
.output { margin-top: 20px; padding: 15px; border: 1px solid #ccc; white-space: pre-wrap; background: #f9f9f9; }
</style>
</head>

<body>

<h2>英文分析＋言語トピック生成ツール（コーパス強化版）</h2>

<label>英文</label>
<textarea id="text">I like music. I often listen to it at night.</textarea>

<label>学習者の世代</label>
<select id="age">
<option>10代前半</option>
<option>10代後半</option>
<option selected>20代前半</option>
<option>20代後半</option>
<option>30代</option>
<option>40代</option>
<option>50代</option>
<option>60代以上</option>
</select>

<button onclick="generate()">① プロンプト生成</button>
<button onclick="copyText()">② コピー</button>

<div class="output" id="output"></div>

<script>
function generate() {
  const text = document.getElementById("text").value;
  const age = document.getElementById("age").value;

  const prompt = `
あなたは英語教師であり、言語学（語彙論・語用論・コーパス言語学）およびSLAの専門家です。

以下の英文をもとに、実用的かつ言語学的に価値の高い教材を作成してください。

【英文】
${text}

【学習者の世代】
${age}

----------------------------------------

■① 文ごとの整理（表）

| No | 原文 | 構造 | 語彙ポイント | 文法ポイント |
|----|------|------|--------------|--------------|

----------------------------------------

■② 言語トピック展開（文ごと）

【①】

● 言語トピック（語彙・表現の拡張）
・比喩・慣用・コロケーションなどを説明

● 実在例（必須）
例文：
"xxxxx"

出典：
作品名（媒体）＋年

※実在のみ

● コーパス・使用実態（最重要）
・日常会話での典型例（2つ）
・よく使われるコロケーション（2〜3）
・フォーマル／カジュアル差
・英語試験での典型出題パターン（例：語彙問題・並び替えなど）

● 追加例文（2つ）
・自然な英文＋日本語訳

● プチ言語活動（2つ）
・即興でできる
・発話が増える設計

----------------------------------------

■③ ルール

・日本語と英語のみ
・韓国語など禁止
・表は簡潔、下は具体的
・コーパスは「典型例」として提示
・不確かな情報は出さない

----------------------------------------
`;

  document.getElementById("output").innerText = prompt;
}

function copyText() {
  const text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  alert("コピーしました！");
}
</script>

</body>
</html>
