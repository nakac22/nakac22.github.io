<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文分析＋言語活動生成ツール（実用版）</title>

<style>
body { font-family: sans-serif; padding: 15px; max-width: 900px; margin: auto; }
textarea, select { width: 100%; margin-bottom: 12px; padding: 10px; font-size: 16px; }
button { width: 100%; padding: 15px; font-size: 18px; margin-top: 5px; }
.output { margin-top: 20px; padding: 15px; border: 1px solid #ccc; white-space: pre-wrap; background: #f9f9f9; }
.notice { font-size: 14px; color: #666; }
</style>
</head>

<body>

<h2>英文分析＋言語活動生成ツール（実用版）</h2>

<label>英文</label>
<textarea id="text">I like music. I often listen to it at night.</textarea>

<label>学習者の世代</label>
<select id="age">
<option>10代前半</option>
<option>10代後半</option>
<option selected>20代前半</option>
<option>20代後半</option>
<option>30代</option>
<option>40代</option>
<option>50代</option>
<option>60代以上</option>
</select>

<button onclick="generate()">① プロンプト生成</button>
<button onclick="copyText()">② コピー</button>

<div class="notice">※コピーできない場合は長押ししてください</div>

<div class="output" id="output"></div>

<script>
function generate() {
  const text = document.getElementById("text").value;
  const age = document.getElementById("age").value;

  const prompt = `
あなたは英語教師であり、言語学・SLAの専門家です。

以下の英文を教材化してください。

【英文】
${text}

【学習者の世代】
${age}

【絶対条件】
・日本語と英語のみ使用
・情報を削りすぎない
・構造は統一する

----------------------------------------

■① 文ごとの整理（表形式）

| No | 原文 | 構造 | 語彙ポイント | 文法ポイント |
|----|------|------|--------------|--------------|

※ルール：
・構造：SVOなど明示
・語彙：重要語＋簡潔な意味
・文法：なぜその形かを簡潔に

----------------------------------------

■② 各文の詳細展開（ここがメイン）

以下を「文ごと」に必ず出力：

【①】
● 関連トピック（具体的に説明）
→ ${age}の学習者が興味を持つ内容を2〜3文で

● 実在コンテンツ例
→ 作品名＋簡単な説明（1〜2文）
→ 例：映画・ドラマ・アニメ・洋楽など

● 例文（2つ）
→ 実際に使える自然な英文＋日本語訳

● プチ言語活動（2つ）
→ すぐできる活動
→ 各1行で具体的に

----------------------------------------

■③ 出力ルール

・文ごとに①②③…と分ける
・表→詳細の順に出す
・説明は具体的に（省略しない）
・ただし冗長にはしない

----------------------------------------

【ハルシネーション防止】
・実在する作品のみ
・不明な場合は出さない
`;

  document.getElementById("output").innerText = prompt;
}

function copyText() {
  const text = document.getElementById("output").innerText;

  if (!text) {
    alert("先に生成してください");
    return;
  }

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      alert("コピーしました！");
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement("textarea");
  textarea.value = text;
  document.body.appendChild(textarea);
  textarea.select();

  try {
    document.execCommand("copy");
    alert("コピーしました！");
  } catch {
    alert("コピーできません。長押ししてください。");
  }

  document.body.removeChild(textarea);
}
</script>

</body>
</html>
