<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文分析＋言語活動生成ツール（専門版）</title>

<style>
body { font-family: sans-serif; padding: 15px; max-width: 900px; margin: auto; }
textarea, select { width: 100%; margin-bottom: 12px; padding: 10px; font-size: 16px; }
button { width: 100%; padding: 15px; font-size: 18px; margin-top: 5px; }
.output { margin-top: 20px; padding: 15px; border: 1px solid #ccc; white-space: pre-wrap; background: #f9f9f9; }
.notice { font-size: 14px; color: #666; }
</style>
</head>

<body>

<h2>英文分析＋言語活動生成ツール（専門版）</h2>

<label>英文（複数文OK）</label>
<textarea id="text">I like music. I often listen to it at night.</textarea>

<label>学習者の世代</label>
<select id="age">
<option>10代前半</option>
<option>10代後半</option>
<option selected>20代前半</option>
<option>20代後半</option>
<option>30代</option>
<option>40代</option>
<option>50代</option>
<option>60代以上</option>
</select>

<button onclick="generate()">① プロンプト生成</button>
<button onclick="copyText()">② コピー</button>

<div class="notice">※コピーできない場合は長押ししてください</div>

<div class="output" id="output"></div>

<script>
function generate() {
  const text = document.getElementById("text").value;
  const age = document.getElementById("age").value;

  const prompt = `
あなたは英語教師であると同時に、理論言語学・応用言語学・第二言語習得研究の専門家です。

以下の英文を、教育的かつ学術的に分析し、高度な教材として再構成してください。

【英文】
${text}

【学習者の世代】
${age}

【最重要条件】
・英文をピリオドごとに①②③…と分割すること
・各文ごとに必ずすべての項目を出力すること

【専門性に関する条件（最重要）】
・CEFR B2以上、場合によってはC1レベルの説明も含める
・単なる文法説明ではなく「なぜその形になるか」を説明する
・以下の観点を適宜含めること：

  - 統語構造（主語・述語・補語・修飾関係）
  - 意味論（ニュアンス・含意・語の選択理由）
  - 語用論（使用場面・社会的意味）
  - コロケーション・チャンク
  - レジスター（フォーマル／カジュアル）
  - 学習者が誤用しやすいポイント
  - 日本語とのズレ（必要に応じて）

【ハルシネーション防止（厳守）】
・アニメ・映画・ドラマ・音楽は「実在する作品のみ」
・不確かなものは絶対に出さない
・広く知られている作品に限定する

【各文ごとの出力】

① 原文（番号付き）

② 語彙分析
・意味
・ニュアンス
・コロケーション
・使用域

③ 文法・構造分析（ここは特に詳細に）
・構文の説明
・なぜこの形になるのか
・別の言い方との違い
・誤用例

④ 関連トピック
・学習者の世代（${age}）に適した内容
・本文と意味的につながるもの

⑤ 実例（実在コンテンツ）
・作品名を明示
・簡潔に紹介

⑥ プチ言語活動（2種類）
・即興でできる
・発話が増える設計
・意味のやりとりが生じるもの

【全体条件】
・教育現場でそのまま使える
・専門性と分かりやすさのバランスをとる
`;

  document.getElementById("output").innerText = prompt;
}

function copyText() {
  const text = document.getElementById("output").innerText;

  if (!text) {
    alert("先に生成してください");
    return;
  }

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      alert("コピーしました！");
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement("textarea");
  textarea.value = text;
  document.body.appendChild(textarea);
  textarea.select();

  try {
    document.execCommand("copy");
    alert("コピーしました！");
  } catch {
    alert("コピーできません。長押ししてください。");
  }

  document.body.removeChild(textarea);
}
</script>

</body>
</html>
