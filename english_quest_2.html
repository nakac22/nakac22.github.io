<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Quest 2 - 時間の認知と視点</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --primary-color: #1e3a8a;
            --accent-color: #3b82f6;
            --border-color: #cbd5e1;
            --card-bg: #ffffff;
            --stamp-active: #3f6b5a; /* 先生のHPカラー */
            --stamp-empty: #94a3b8;
            --success-bg: #f0fdf4;
            --success-border: #3f6b5a;
            --error-bg: #fef2f2;
            --error-border: #dc2626;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.8; padding: 30px 20px; display: flex; justify-content: center; }
        
        #app {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            position: relative;
            min-height: 650px;
        }

        .avatar-container { text-align: center; margin-bottom: 15px; }
        .avatar-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #eff6ff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        h1 { font-size: 2.4rem; text-align: center; color: var(--primary-color); margin-bottom: 8px; font-weight: 800; }
        .subtitle { text-align: center; font-size: 1.2rem; color: #64748b; margin-bottom: 35px; }
        h2 { font-size: 1.5rem; margin-top: 30px; margin-bottom: 15px; color: var(--primary-color); border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
        h3.chapter-title { font-size: 1.15rem; color: #475569; margin-top: 25px; margin-bottom: 10px; padding-left: 8px; border-left: 4px solid var(--accent-color); font-weight: 700; }
        p { margin-bottom: 18px; }

        .btn {
            background-color: var(--primary-color); color: white; border: none; padding: 14px 28px; font-size: 1rem;
            border-radius: 8px; cursor: pointer; font-weight: 600; transition: background 0.2s, transform 0.1s; display: inline-block;
        }
        .btn:hover { background-color: #1d4ed8; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background-color: #cbd5e1; cursor: not-allowed; transform: none; }

        .nav-menu { position: absolute; top: 35px; right: 40px; }
        .nav-menu .btn-nav { padding: 8px 16px; font-size: 0.85rem; background: transparent; color: #64748b; border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; }
        .nav-menu .btn-nav:hover { background: #f1f5f9; color: var(--primary-color); }

        .screen { display: none; margin-top: 20px; }
        .screen.active { display: block; }

        .intro-box { background: #f1f5f9; padding: 20px; border-radius: 10px; margin-bottom: 30px; border-left: 4px solid var(--primary-color); }

        .quest-world-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 25px; margin-bottom: 25px; }
        .quest-world-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px dashed var(--border-color); }
        .quest-world-header h3 { color: var(--primary-color); font-size: 1.3rem; font-weight: 700; }

        /* スタンプエリアの共通化・軽量化 */
        .stamps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; padding: 10px 0; margin-bottom: 20px; background: #f8fafc; padding: 12px; border-radius: 8px; }
        .stamp-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px dashed var(--stamp-empty); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: var(--stamp-empty); background: #fff; transition: all 0.3s; }
        .stamp-dot.cleared { border: 2px solid var(--stamp-active); color: var(--stamp-active); background: #e8f5e9; transform: scale(1.05); }

        .level-nodes { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .level-node-btn { padding: 10px; font-size: 0.85rem; background-color: #f8fafc; color: var(--text-color); border: 1px solid #e2e8f0; border-radius: 6px; font-weight: 600; text-align: center; cursor: pointer; transition: all 0.2s; }
        .level-node-btn:hover:not(:disabled) { background-color: #f1f5f9; border-color: #cbd5e1; }
        .level-node-btn.cleared { background-color: #edfdf2; border-color: #bbf7d0; color: #15803d; }

        .story-text-area { font-size: 1.05rem; background: #f8fafc; padding: 30px; border-radius: 10px; border-left: 6px solid var(--primary-color); margin-bottom: 30px; }
        .story-text-area p { margin-bottom: 12px; }
        .story-text-area p:last-child { margin-bottom: 0; }

        .academic-badge-zone { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .academic-badge { font-size: 0.75rem; padding: 3px 8px; border-radius: 4px; font-weight: bold; background: #e0e7ff; color: #4338ca; }
        .academic-badge.social { background: #fef3c7; color: #b45309; }

        .question-zone { font-weight: 700; font-size: 1.15rem; margin-bottom: 20px; color: #0f172a; }
        .choices-zone { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .choice-item-btn { background: #fff; color: var(--text-color); border: 1px solid #e2e8f0; border-radius: 8px; text-align: left; padding: 15px; font-size: 1rem; width: 100%; cursor: pointer; font-weight: 500; transition: all 0.2s; line-height: 1.5; }
        .choice-item-btn:hover:not(:disabled) { background: #f8fafc; border-color: #cbd5e1; }
        .choice-item-btn.correct { background-color: #edfdf2 !important; border-color: var(--success-border) !important; font-weight: bold; color: #16a34a; }
        .choice-item-btn.wrong { background-color: #fdf2f2 !important; border-color: var(--error-border) !important; color: #dc2626; opacity: 0.8; }

        .feedback-zone { padding: 25px; border-radius: 10px; display: none; margin-top: 25px; line-height: 1.7; }
        .feedback-zone.correct-zone { background: var(--success-bg); border: 1px solid var(--success-border); }
        .feedback-zone.wrong-zone { background: var(--error-bg); border: 1px solid var(--error-border); }
        .feedback-status { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .academic-bridge-content { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #cbd5e1; font-size: 0.95rem; color: #334155; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            #app { padding: 20px; }
            .nav-menu { position: static; text-align: right; margin-bottom: 20px; }
            h1 { font-size: 1.8rem; }
            .level-nodes { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="global-nav" class="nav-menu" style="display: none;">
        <button class="btn-nav" onclick="saveAndExit()">セーブしてマップに戻る</button>
    </div>

    <div id="screen-main" class="screen active">
        <div class="avatar-container">
            <!-- 共通アバター（ore.png / 存在しない場合は非表示） -->
            <img src="ore.png" alt="Navigator" class="avatar-img" onerror="this.src='グッドをする俺.png'; this.onerror=function(){this.style.display='none';};">
        </div>
        
        <h1>English Quest 2</h1>
        <div class="subtitle">〜時間の認知と視点〜</div>

        <div class="intro-box">
            <strong style="color:var(--primary-color); font-size:1.1rem; display:block; margin-bottom:6px;">【Quest II: 時間の世界】テーマ</strong>
            人間は時間を客観的な流れのまま見ているのではありません。出来事が「今とどう関係するか」「どこから眺めるか」「どのくらい続くか」「どのくらい確実か」によって主観的に理解しています。英語話者の時間カメラをインストールし、文法の中核へ飛び込みましょう！
        </div>

        <h2>冒険の進捗（全40レベル）</h2>
        <div id="worlds-container"></div>

        <div style="text-align: center; margin-top: 40px;">
            <button onclick="resetSaveData()" style="background:#dc2626; font-size:0.8rem; padding:8px 16px;" class="btn">冒険の書（セーブデータ）をリセット</button>
        </div>
    </div>

    <div id="screen-quest" class="screen">
        <h2 id="quest-header-title">Level X</h2>
        <div class="story-text-area" id="story-container"></div>
        <div class="question-zone" id="question-container"></div>
        <div class="choices-zone" id="choices-container"></div>

        <div class="feedback-zone" id="feedback-container">
            <div class="feedback-status" id="feedback-status"></div>
            <div id="feedback-text"></div>
            <div style="text-align: right; margin-top: 25px;">
                <button id="next-action-btn" class="btn" onclick="advanceQuest()">スタンプを獲得してマップに戻る</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 構造化データ：全40レベルの完全記述データ ---
    const questData = {
        id: "quest2",
        title: "Quest II: 時間の世界",
        chapters: [
            { title: "第1章 「今」という基準点 (Lv1〜8)", startIdx: 0, endIdx: 7 },
            { title: "第2章 過去という別世界 (Lv9〜16)", startIdx: 8, endIdx: 15 },
            { title: "第3章 進行する時間 (Lv17〜22)", startIdx: 16, endIdx: 21 },
            { title: "第4章 過去と現在をつなぐ橋 (Lv23〜31)", startIdx: 22, endIdx: 30 },
            { title: "第5章 未来という未完成世界 (Lv32〜38)", startIdx: 31, endIdx: 37 },
            { title: "第6章 英語話者の時間観 (Lv39〜40)", startIdx: 38, endIdx: 39 }
        ],
        levels: [
            // --- 第1章 ---
            {
                id: "q2_l1", title: "今を切り取る", grammar: "現在形", cognitive: "基準点設定", social: "英語観",
                text: [
                    "あなたの時計の秒針がチクタクと動いている光景を想像してください。私たちは日常、「いまこの瞬間」を生きています。しかし不思議なことに、英語の『現在形』は、その一瞬だけを指す言葉ではありません。",
                    "英語話者にとって、世界はまず『今』という確固たる基準点から始まります。彼らの言う現在形とは、昨日も今日も明日も、その基準点の周辺で『いつでも当たり前に成り立つ安定した世界』をズームアウトして切り取る感覚なのです。では、自己紹介で自分の職業を言うとき、カメラはどこを向いているでしょうか？"
                ],
                question: "【問題】「私は岐阜大学の学生です（あるいは教員です）」と、今の一瞬だけでなく、昨日も明日も変わらない自分の安定したアイデンティティとして相手に伝えるとき、最もふさわしい表現はどちらでしょう？",
                choices: [
                    { text: "I am a student at Gifu University.", correct: true, feedback: "<strong>【解説】</strong>大正解！ 現在形 “am” は、一瞬の火花のような動作ではなく、過去・現在・未来にわたって『当たり前に成立する安定した状態』を宣言します。だからこそ、所属や職業を語るのに最適なのです。<div class='academic-bridge-content'>💡 **学問への架け橋**：認知言語学において、時間が経過しても変化しない安定した関係性を捉える概念を**「状態（State）」**と呼びます。現在形は、話し手が「今」をハブ（基準点）にして、時間を超えた確実な世界を提示するシステムなのです。</div>" },
                    { text: "I am being a student at Gifu University.", correct: false, feedback: "<strong>【解説】</strong>これだと進行形（being）のニュアンスが混ざり、「今この瞬間だけ、一時的に学生のフリをしている」という、奇妙で不自然なカメラワークになってしまいます。どっしりとした安定した現在形を選び直しましょう。" }
                ]
            },
            {
                id: "q2_l2", title: "変わらない事実", grammar: "現在形", cognitive: "恒常性", social: "英語観",
                text: [
                    "理科の実験室で、ビーカーに入った水がコンロの炎で熱せられ、100度に達して激しく沸騰している光景を想像してください。この現象は、100年前のイギリスでも、明日の日本でも、気圧が同じなら絶対に変わりません。",
                    "このように、人間の都合や時間の流れの枠外にある「科学的真理」や「普遍の事実」を語るとき、英語話者は迷わず現在形を選択します。彼らの脳内では、真理とは『時間が経過しても一切揺るがない、究極の安定世界』としてマッピングされているからです。"
                ],
                question: "【問題】「水は100度で沸騰する」という、時間の枠を超えた普遍の科学的真理を客観的に言い切るとき、最も適切な英文はどちらでしょう？",
                choices: [
                    { text: "Water boils at 100°C.", correct: true, feedback: "<strong>【解説】</strong>正解です！ 普遍の事実は、過去・現在・未来のいつでも成り立つため、現在形 “boils” が100%の確率で起動します。時間の経過によって劣化しない事実には、現在形という「不動のフレーム」が与えられるのです。<div class='academic-bridge-content'>💡 **学問への架け橋**：認知言語学では、このように時間的な境界を持たず、常に成立し続ける性質を**「恒常性（Permanence）」**と呼びます。文法は、人間が世界のルールをどうメタ認知しているかを反映しているのです。</div>" },
                    { text: "Water is boiling at 100°C.", correct: false, feedback: "<strong>【解説】</strong>これだと「（今、目の前にある特定の）水が100度で沸騰している最中だ」という、一時的な実況中継になってしまい、一般的な科学の真理ではなくなってしまいます。普遍の心理を示す形をもう一度選びましょう。" }
                ]
            },
            {
                id: "q2_l3", title: "習慣という時間", grammar: "現在形", cognitive: "反復パターン", social: "英語観",
                text: [
                    "毎朝、目覚まし時計の音でパッと目を覚まし、眠い目をこすりながら歯を磨き、決まった時間に家を出るあなたの日常を想像してください。一つ一つの動作は一瞬で終わりますが、それが毎日繰り返されることで、あなたの中に「生活のレール」が敷かれます。",
                    "人間は繰り返しでできています。英語話者は、この定期的に反復される「習慣」を、バラバラの点の動作ではなく、人生の中にずっと存在している『一つの安定した模様（パターン）』として捉えます。だからこそ、ここでも現在形が大活躍するのです。"
                ],
                question: "【問題】「私は毎日、朝食にトーストを食べます」という、自分の生活の一部として定着している反復パターンを表現するとき、最もふさわしい形はどちらでしょう？",
                choices: [
                    { text: "I eat toast for breakfast every day.", correct: true, feedback: "<strong>【解説】</strong>正解です！ “I eat” という現在形が “every day” とガッチリ噛み合うことで、「昨日も今日も、そして明日もおそらく同じレールの上を走る」という、反復パターンの認知が完成します。<div class='academic-bridge-content'>💡 **学問への架け橋**：心理学や言語学において、個別の出来事を脳内で抽象化し、構造的な習慣として認識する働きを**「スキーマの形成」**や**「反復パターン認知」**と呼びます。現在形は、あなたの生活の構造を描写する言葉なのです。</div>" },
                    { text: "I am eating toast for breakfast every day.", correct: false, feedback: "<strong>【解説】</strong>これだと、毎日「今まさに口にトーストを詰め込んでいる真っ最中だ」という、非常に窮屈で不自然な絵になってしまいます。生活のパターンをゆったりと描写する現在形を選び直してください。" }
                ]
            },
            {
                id: "q2_l4", title: "頻度で世界を見る", grammar: "always / usually", cognitive: "プロトタイプ効果", social: "英語観",
                text: [
                    "カレンダーを目の前に広げて、自分がどれだけの頻度である行動をしているか、上から指で数えていく場面を想像してください。全てのマス目が埋まっている状態から、時々ポツポツと穴が空いている状態まで、頻度のグラデーションが存在します。",
                    "英語話者は、世界の確率を言葉で微調整します。その代表が “always（100%）” や “usually（80〜90%）” です。これらは現在形の世界に『どれくらい例外なくそのパターンが繰り返されるか』という確率のグラデーション（色彩）を塗り替える役割を持っています。"
                ],
                question: "【問題】「彼はいつも（例外なく100%の確率で）時間通りに来る」と、彼の絶対的な信頼性を現在形のパターンとして語るとき、空欄に滑り込ませるべき副詞はどちらでしょう？<br>He (  ) comes on time.",
                choices: [
                    { text: "always", correct: true, feedback: "<strong>【解説】</strong>その通り！ “always” は確率100%のプロトタイプ（典型）を示し、現在形と組み合わさることで「例外のない絶対的な法則」を脳内に描きます。これに対して “usually” は「大抵はそうだけど、たまに例外もある」という一歩引いたニュアンスになります。<div class='academic-bridge-content'>💡 **学問への架け橋**：認知言語学の**「プロトタイプ理論」**によれば、人間の概念には「最も典型的な中心」が存在します。 “always” は、現在形の持つ恒常性の感覚を、確率の観点から100%の典型値にロックする強力なモディファイア（修飾語）なのです。</div>" },
                    { text: "usually", correct: false, feedback: "<strong>【解説】</strong> “usually” も素晴らしい副詞ですが、これだと「普通は時間通りに来る（が、たまに遅れることもある）」という80〜90%の確率になり、「いつも例外なく」という絶対的なニュアンスからは少し後退してしまいます。もう一度選んでみましょう。" }
                ]
            },
            {
                id: "q2_l5", title: "毎回ではなく「だいたい」", grammar: "sometimes", cognitive: "カテゴリー中心性", social: "英語観",
                text: [
                    "1週間のうち、3日くらいは自炊をして、残りの日は外食で済ませるような、少し不規則な生活のバランスを想像してください。毎日ではないけれど、自分の人生のタイムラインをざっと見渡したとき、確かにその行動がポツポツと点在している感覚です。",
                    "“sometimes” という言葉は、確率としては50%程度、つまり「やる時もあれば、やらない時もある」という、カテゴリーのちょうど境界線あたりに位置する感覚です。しかし、これも「時々起きるのがいつものパターンだ」という広い意味での現在形の世界に属しています。"
                ],
                question: "【問題】「私は時々、夜遅くにコーヒーを飲むことがある（毎回ではないが、そういうパターンも人生にある）」と伝えるとき、適切な位置に副詞を配置した英文はどちらでしょう？",
                choices: [
                    { text: "I sometimes drink coffee late at night.", correct: true, feedback: "<strong>【解説】</strong>正解です！ “sometimes” などの頻度副詞は、動詞の「直前」に置くことで、その動作が発動する確率のスイッチを脳内でパチッと切り替える役割を果たします。「飲む」という行為の打率を5割に設定するカメラワークです。<div class='academic-bridge-content'>💡 **学問への架け橋**：言語学では、こうした頻度の表現を**「量化（Quantification）」**の一部として分析します。毎日（always）から時々（sometimes）への変化は、人間が頭の中で時間の出来事をどれくらい「濃いカテゴリー」として認知しているかを示しています。</div>" },
                    { text: "I drink coffee late at night sometimes always.", correct: false, feedback: "<strong>【解説】</strong>これだと副詞が後ろに渋滞している上に、 “sometimes（時々）” と “always（いつも）” という矛盾する確率が並んでしまい、脳内カメラが完全にパニックを起こしてしまいます。適切な位置のシンプルな形を再選択してください。" }
                ]
            },
            {
                id: "q2_l6", title: "現在形で未来を語る", grammar: "The train leaves at 8.", cognitive: "スケジュール認知", social: "英語観",
                text: [
                    "駅のホームに立って、巨大な電光掲示板に表示された「発車時刻：午前8:00」という文字を見上げている場面を想像してください。まだ時計の針は7時50分ですが、あなたの中に「電車が8時に出る」ということに対する疑いは1ミリもありません。",
                    "なぜ未来のことなのに “will” を使わず、現在形 “leaves” で言えるのでしょうか？ それは、その予定が個人の気まぐれではなく、社会の時刻表やカレンダーに組み込まれた『変更不可能な絶対の事実（確定した未来）』だからです。英語話者は、これを「今すでにレールの上に載っている確定世界」として、現在形で処理します。"
                ],

                    { text: "I have been to Hawaii three times.", correct: true, feedback: "<strong>【解説】</strong>正解です！ “I have been to...” は、過去にそこを訪れて、今は戻ってきているけれど、その「行ったことがある」という無形の財産を今の自分の引き出しにしっかりと “have” して持っている、という大人のカメラワークです。回数（three times）のコインが貯金箱に貯まっています。<div class='academic-bridge-content'>💡 **学問への架け橋**：これを言語学や心理学では、過去の出来事が個人の内面に積み重なって現在のアイデンティティを構成する**「経験の蓄積（Accumulation of Experience）」**モデルと呼びます。現在完了は、今のあなたの人生の厚みを測るメーターなのです。</div>" },
                    { text: "I went to Hawaii three times yesterday.", correct: false, feedback: "<strong>【解説】</strong>これだと過去形（went）の断絶世界になり、さらに “yesterday（昨日）” がついているので、「昨日1日の間に、ハワイへ3往復した」という、物理的にあり得ない超音速の強行軍の絵になってしまいます。現在完了の蓄積を選びましょう。" }
                ]
            },

                    "会話の中で “ever（これまでの人生で一度でも）” や “never（生まれてから一度も〜ない）” という強い副詞を使うとき、英語話者は現在完了の橋の長さを「その人の全人生の巻物」のスケールにまで最大化します。相手のこれまでの歩みすべてに敬意を払い、問いかける社会的な作法です。"

                question: "【問題】「あなたはこれまでの人生で、一度でも富士山に登ったことがありますか？」と、相手の人生の巻物全体に問いかけるときの、資格試験でも定番の最も正しい現在完了の疑問文はどちらでしょう？",
                choices: [

                    { text: "Did you climbed Mt. Fuji ever?", correct: false, feedback: "<strong>【解説】</strong>これだと過去形の疑問文（Did）の断絶世界の中に、全人生の広がりを示す “ever” が無理やり押し込まれ、さらに “did” の後ろなのに動詞が過去形（climbed）のままという二重のエラーを起こしています。" }

                question: "【問題】「私は鍵をなくしてしまった（そして、その最悪な結果のまま今も鍵を持っていなくて困っている）」という、現在のリアルな困惑を100%込めて相手に報告するときの正しい形はどちらでしょう？",

                question: "【問題】まだ「今週」という時間枠が終わっていない木曜日の時点で、「私は今週、3冊の本を読んだ（時間枠はまだ開いているので、これから4冊目を読む可能性もある）」と語るときの正しい英文はどちらでしょう？",

                    { text: "I read three books last week this week.", correct: false, feedback: "<strong>【解説】</strong> “last week（先週：閉じた世界）” と “this week（今週：開いた世界）” という、文法的に水と油のフレームが1文の中に無理やり押し込まれ、カメラが完全にブレてしまっています。開いた世界には現在完了を選びましょう。" }

            {

                    "出来事が完了した瞬間が、現在の基準点に対して「目と鼻の先」にある驚くほどの近さであることを示すスパイスが “just（ちょうど今、たった今）” です。過去の行為のしっぽが、現在の絶壁に生々しくピトッと触れているような、極限の『近接性』のカメラワークです。"

                question: "【問題】「私はたった今、宿題を終えたところです（まだペンを置いたばかりで、インクが乾いていないほどの近さ）」という完了の臨場感を正しく表現している英文はどちらでしょう？",
                choices: [
                    { text: "I have just finished my homework.", correct: true, feedback: "<strong>【解説】</strong>完璧です！ “have finished” という橋の真ん中に “just” を挟み込むことで、「過去の行為が、まさに今この瞬間にゴールインした」という、距離ゼロの生々しい完了の瞬間が聞き手の脳内に滑り込みます。相手も「おお、お疲れ様！」と即座に反応できます。<div class='academic-bridge-content'>💡 **学問への架け橋**：認知言語学において、時間的な距離感が極めてゼロに近い状態を認識する働きを**「時間的近接性（Temporal Proximity）」**の認知と呼びます。 “just” は、現在完了の橋を一瞬の細い糸にまで絞り込むズームレンズなのです。</div>" },

            {

                text: [

                question: "【問題】「私はもう（予定や相手の期待よりも早く）その宿題を終わらせちゃいましたよ！」と、現在の完了状態を自信満々に相手に伝えるときの正しい英文はどちらでしょう？",
                choices: [
                    { text: "I have already finished the homework.", correct: true, feedback: "<strong>【解説】</strong>正解です！ “already” を現在完了に混ぜることで、「相手が想定していたタイムラインよりも、遥か手前の時点で過去の行為が完了し、すでに今の私の手元にhaveされている」という驚きと自信の絵になります。社会的な会話に感情を乗せる素晴らしい形です。<div class='academic-bridge-content'>💡 **学問への架け橋**：言語学では、話し手の事前の想定や予測のフレームと、現実の出来事のズレを表現する仕組みを**「予測（Expectation）のコントロール」**と呼びます。文法は、冷徹な事実だけでなく、人間の心のバイアスを表現する器なのです。</div>" },

                question: "【総合問題】「私はこれまでずっと彼女を知っている（過去から今へ地続きの継続）」という時間線と、「私はちょうど今、鍵を見つけた（現在の絶壁への劇的な着地）」という２つの光景を、現在完了の本質（今へのリンク）で正しく表現しているペアはどちらでしょう？",
                choices: [

                question: "【問題】「明日は雨が降るだろう（私の脳内のデータに基づけば、おそらくそうなる確率が高いと予測する）」と、主観的な予測の世界を表現するときの最も正しい英文はどちらでしょう？",
                choices: [
                    { text: "It will rain tomorrow.", correct: true, feedback: "<strong>【解説】</strong>正解です！ “will” は、まだ見ぬ未完成の未来の世界に対して、話し手の頭の中から「きっとこうなるぞ」と矢印をピーンと飛ばす『予測（Prediction）』のカメラワークです。未来形という事実は存在せず、すべては人間の主観のモードなのです。<div class='academic-bridge-content'>💡 **学問への架け橋**：言語学では、事実そのものを表す文法と、話し手の主観的な推量や態度を表す文法（助動詞など）を明確に区別し、後者を**「法性（Modality：モダリティ）」**と呼びます。 “will” は未来の記号ではなく、予測というモダリティの心の引き出しなのです。</div>" },

    // --- セーブデータ管理（元のロジックを完全維持） ---
    let playerProgress = { clearedLevelIds: [] };

    function loadGame() {
        const saved = localStorage.getItem('english_quest_q2_save');
        if (saved) {
            try { playerProgress = JSON.parse(saved); } catch(e) { console.error(e); }
        }
    }

    function saveGame() {
        localStorage.setItem('english_quest_q2_save', JSON.stringify(playerProgress));
    }

    function resetSaveData() {
        if (confirm("これまでのQuest 2の冒険の書をリセットします。よろしいですか？")) {
            localStorage.removeItem('english_quest_q2_save');
            playerProgress = { clearedLevelIds: [] };
            alert("リセットしました。新たな時間の旅へ出発しましょう！");
            renderMainScreen();
        }
    }

    // --- 画面遷移管理（元のロジックを完全維持） ---
    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if (screenId === 'screen-main') {
            document.getElementById('global-nav').style.display = 'none';
        } else {
            document.getElementById('global-nav').style.display = 'block';
        }
    }

    function saveAndExit() {
        saveGame();
        renderMainScreen();
        switchScreen('screen-main');
    }

    // --- メイン画面の動的生成（章立てヘッダー対応版） ---
    function renderMainScreen() {
        loadGame();
        const container = document.getElementById('worlds-container');
        container.innerHTML = '';

        const worldCard = document.createElement('div');
        worldCard.className = 'quest-world-card';

        const header = document.createElement('div');
        header.className = 'quest-world-header';
        
        const totalLevels = questData.levels.length;
        const clearedCount = questData.levels.filter(l => playerProgress.clearedLevelIds.includes(l.id)).length;
        
        header.innerHTML = `
            <h3>${questData.title}</h3>
            <span style="font-size:0.9rem; color:#475569; font-weight:bold;">獲得スタンプ: ${clearedCount} / ${totalLevels}</span>
        `;
        worldCard.appendChild(header);

        // 軽量化された共通スタンプグリッド
        const stampsGrid = document.createElement('div');
        stampsGrid.className = 'stamps-grid';
        questData.levels.forEach((lvl, idx) => {
            const isLvlCleared = playerProgress.clearedLevelIds.includes(lvl.id);
            const stampDot = document.createElement('div');
            stampDot.className = `stamp-dot ${isLvlCleared ? 'cleared' : ''}`;
            stampDot.innerHTML = isLvlCleared ? '👍' : (idx + 1);
            stampsGrid.appendChild(stampDot);
        });
        worldCard.appendChild(stampsGrid);

        // 章立てごとに見出しをつけながらボタンを配置
        questData.chapters.forEach(ch => {
            const chHeader = document.createElement('h3');
            chHeader.className = 'chapter-title';
            chHeader.innerText = ch.title;
            worldCard.appendChild(chHeader);

            const nodesDiv = document.createElement('div');
            nodesDiv.className = 'level-nodes';

            for (let i = ch.startIdx; i <= ch.endIdx; i++) {
                const lvl = questData.levels[i];
                const isLvlCleared = playerProgress.clearedLevelIds.includes(lvl.id);
                
                let isLocked = false;
                if (i > 0) {
                    const prevLvlId = questData.levels[i - 1].id;
                    if (!playerProgress.clearedLevelIds.includes(prevLvlId)) {
                        isLocked = true;
                    }
                }

                const nodeBtn = document.createElement('button');
                nodeBtn.className = `level-node-btn ${isLvlCleared ? 'cleared' : ''}`;
                
                if (isLocked) {
                    nodeBtn.innerText = `🔒 Lv ${i + 1}`;
                    nodeBtn.disabled = true;
                } else {
                    nodeBtn.innerText = `${isLvlCleared ? '✓ ' : ''}Level ${i + 1}`;
                    nodeBtn.onclick = () => startQuest(i);
                }
                nodesDiv.appendChild(nodeBtn);
            }
            worldCard.appendChild(nodesDiv);
        });

        container.appendChild(worldCard);
    }

    // --- クエスト進行ロジック（シャッフルロジック完全維持） ---
    let activeLevelIndex = 0;

    function shuffleArray(array) {
        const clone = [...array];
        for (let i = clone.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const temp = clone[i];
            clone[i] = clone[j];
            clone[j] = temp;
        }
        return clone;
    }

    function startQuest(levelIndex) {
        activeLevelIndex = levelIndex;
        switchScreen('screen-quest');

        const lvlData = questData.levels[levelIndex];
        document.getElementById('quest-header-title').innerText = `Level ${levelIndex + 1} : ${lvlData.title}`;
        
        const storyBox = document.getElementById('story-container');
        storyBox.innerHTML = `
            <div class="academic-badge-zone">
                <span class="academic-badge">中心文法: ${lvlData.grammar}</span>
                <span class="academic-badge">認知言語学: ${lvlData.cognitive}</span>
                <span class="academic-badge social">社会言語学・英語観: ${lvlData.social}</span>
            </div>
        `;
        lvlData.text.forEach(para => {
            const p = document.createElement('p');
            p.innerText = para;
            storyBox.appendChild(p);
        });

        document.getElementById('question-container').innerHTML = lvlData.question;
        
        const choicesBox = document.getElementById('choices-container');
        choicesBox.innerHTML = '';
        document.getElementById('feedback-container').style.display = 'none';

        const indexedChoices = lvlData.choices.map((c, i) => ({ ...c, originalIndex: i }));
        const shuffledChoices = shuffleArray(indexedChoices);

        shuffledChoices.forEach((choice) => {
            const btn = document.createElement('button');
            btn.className = 'choice-item-btn';
            btn.innerHTML = choice.text;
            btn.onclick = () => selectChoice(choice.originalIndex, btn);
            choicesBox.appendChild(btn);
        });
    }

    function selectChoice(originalIndex, clickedBtn) {
        const lvlData = questData.levels[activeLevelIndex];
        const selectedChoice = lvlData.choices[originalIndex];

        const buttons = document.querySelectorAll('.choice-item-btn');
        buttons.forEach(b => b.disabled = true);

        const feedbackContainer = document.getElementById('feedback-container');
        const statusText = document.getElementById('feedback-status');
        const fbText = document.getElementById('feedback-text');
        const nextBtn = document.getElementById('next-action-btn');

        feedbackContainer.style.display = 'block';

        if (selectedChoice.correct) {
            clickedBtn.classList.add('correct');
            feedbackContainer.className = "feedback-zone correct-zone";
            statusText.innerText = "👍 大正解！そのカメラワークです。";
            fbText.innerHTML = selectedChoice.feedback;
            nextBtn.style.display = 'inline-block';

            if (!playerProgress.clearedLevelIds.includes(lvlData.id)) {
                playerProgress.clearedLevelIds.push(lvlData.id);
                saveGame();
            }
        } else {
            clickedBtn.classList.add('wrong');
            feedbackContainer.className = "feedback-zone wrong-zone";
            statusText.innerText = "🔍 英語話者の時間の見方を、もう一度イメージしてみよう";
            fbText.innerHTML = selectedChoice.feedback;
            nextBtn.style.display = 'none';

            setTimeout(() => {
                buttons.forEach(b => {
                    if (!b.classList.contains('wrong')) b.disabled = false;
                });
            }, 1500);
        }
    }

    function advanceQuest() {
        alert(`タイムラインスタンプを獲得しました！`);
        saveAndExit();
    }

    window.onload = () => {
        renderMainScreen();
    };
</script>

</body>
