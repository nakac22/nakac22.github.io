const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H,p,b=[],w=[],exp=0,idx=0,score=0,combo=0,life=3,run=false;
let currentUnitIdx = 0;

let comboText = { txt: "", timer: 0, scale: 1 };
let systemText = { txt: "", timer: 0 };
let particles = [];
let isReading = false; // 音声読み上げ中のフラグ（インベーダーの一時停止用）

const AudioSys = {
  ctx: null,
  init() {
    if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  },
  play(type) {
    this.init();
    if(!this.ctx) return;
    const t = this.ctx.currentTime;
    
    if(type === 'correct') {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, t);
      osc.frequency.exponentialRampToValueAtTime(900, t + 0.15);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.linearRampToValueAtTime(0, t + 0.15);
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.start(t); osc.stop(t + 0.15);
    } 
    else if(type === 'combo') {
      const osc1 = this.ctx.createOscillator();
      const osc2 = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc1.type = 'triangle'; osc2.type = 'sine';
      osc1.frequency.setValueAtTime(800, t);
      osc1.frequency.setValueAtTime(1200, t + 0.06);
      osc2.frequency.setValueAtTime(1500, t + 0.03);
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.linearRampToValueAtTime(0, t + 0.25);
      osc1.connect(gain); osc2.connect(gain);
      gain.connect(this.ctx.destination);
      osc1.start(t); osc1.stop(t + 0.25);
      osc2.start(t); osc2.stop(t + 0.25);
    } 
    else if(type === 'clear') {
      const notes = [523.25, 659.25, 783.99, 1046.50];
      notes.forEach((freq, idx) => {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(freq, t + idx * 0.08);
        gain.gain.setValueAtTime(0.15, t + idx * 0.08);
        gain.gain.linearRampToValueAtTime(0, t + idx * 0.08 + 0.3);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(t + idx * 0.08); osc.stop(t + idx * 0.08 + 0.3);
      });
    } 
    else if(type === 'wrong') {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(130, t);
      osc.frequency.linearRampToValueAtTime(100, t + 0.3);
      gain.gain.setValueAtTime(0.3, t);
      gain.gain.linearRampToValueAtTime(0, t + 0.3);
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.start(t); osc.stop(t + 0.3);
    }
  }
};

const StampSys = {
  stamps: [false, false, false, false],
  load() {
    for(let i=0; i<4; i++) {
      this.stamps[i] = localStorage.getItem('moi_stamp_' + i) === 'true';
      const el = document.getElementById('stamp-' + i);
      if(el && this.stamps[i]) el.classList.add('active');
    }
  },
  unlock(unitIdx) {
    if(unitIdx >= 0 && unitIdx < 4) {
      this.stamps[unitIdx] = true;
      localStorage.setItem('moi_stamp_' + unitIdx, 'true');
      const el = document.getElementById('stamp-' + unitIdx);
      if(el) el.classList.add('active');
    }
  }
};

// 【新規追加】完成した英文を英語の正しい発音で読み上げる機能
function speakSentence(wordsArray, callback) {
  if ('speechSynthesis' in window) {
    isReading = true; // 読み上げ開始（インベーダーの一時停止）
    window.speechSynthesis.cancel(); // 念のため前の再生をクリア
    
    // 語句の配列を一つの英文に結合
    const sentence = wordsArray.join(" ");
    const utterance = new SpeechSynthesisUtterance(sentence);
    utterance.lang = 'en-US';
    utterance.rate = 0.9; // 小学生でも聞き取りやすいよう、ほんの少しゆっくりに設定
    
    utterance.onend = () => {
      isReading = false; // 読み上げ終了
      callback();
    };
    utterance.onerror = () => {
      isReading = false;
      callback();
    };
    
    window.speechSynthesis.speak(utterance);
  } else {
    // 読み上げ非対応ブラウザの場合はそのまま次へ
    callback();
  }
}

function resize(){
  W=innerWidth; H=innerHeight-135;
  cv.width=W; cv.height=H;
  if(p)p.y=H-45;
}
addEventListener('resize',resize);

function start(){
  AudioSys.init();
  document.getElementById('menu').style.display='none';
  document.getElementById('ui').style.display='block';
  resize();
  score=0; combo=0; life=3; idx=0; currentUnitIdx=0; isReading = false;
  p={x:W/2,y:H-45}; run=true;
  comboText.timer = 0;
  systemText.timer = 0;
  particles = [];
  load();
}

function load(){
  document.querySelectorAll('.slot').forEach(x=>x.classList.remove('done'));
  exp=0; w=[];
  
  let unit = UNIT_DATA[currentUnitIdx];
  let s = unit.data[idx % unit.data.length];
  
  let pos=[...Array(s.c.length).keys()].sort(()=>Math.random()-0.5);
  let segmentWidth = W / (s.c.length + 0.2);
  
  s.c.forEach((t,i)=>{
    w.push({
      t, 
      r:s.r[i], 
      o:i, 
      x: 10 + pos[i] * segmentWidth + (Math.random()*10 - 5), 
      y:40, 
      sd: 0.35 + Math.random() * 0.25, 
      h:false,
      ww: 90
    });
  });
}

function rolei(r){return ["だれ","いつ","する","なに","どこ"].indexOf(r)}
function mv(d){if(p) p.x=Math.max(25,Math.min(W-25,p.x+d))}
function shoot(){if(run && p && !isReading) b.push({x:p.x,y:p.y})}

document.addEventListener('keydown',e=>{
  if(e.key=="ArrowLeft")mv(-40);
  if(e.key=="ArrowRight")mv(40);
  if(e.key==" ")shoot();
});

function addParticles(x, y, color) {
  for(let i=0; i<12; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      r: Math.random() * 4 + 2,
      alpha: 1,
      color: color
    });
  }
}

function triggerComboText(comboCount) {
  if (comboCount === 5) { comboText = { txt: "Nice!", timer: 60, scale: 1.5 }; AudioSys.play('combo'); }
  else if (comboCount === 10) { comboText = { txt: "Great!", timer: 60, scale: 1.8 }; AudioSys.play('combo'); }
  else if (comboCount === 20) { comboText = { txt: "Amazing!", timer: 60, scale: 2.2 }; AudioSys.play('combo'); }
  else if (comboCount === 30) { comboText = { txt: "Meaning Master!", timer: 60, scale: 2.5 }; AudioSys.play('combo'); }
}

function update(){
  if(!run || !p)return; // 開始前のバグ防止
  
  // 【修正】音声読み上げ中はインベーダーの落下と弾の移動を停止させ、学習・視聴に集中させる
  if (!isReading) {
    w.forEach(x=>{
      if(!x.h) x.y += x.sd;
      if(x.y > H - 85){
        AudioSys.play('wrong');
        life--; combo=0; load();
      }
    });
    b.forEach(x => x.y -= 12);
  }
  
  b.forEach((bb, bi)=>{
    w.forEach(x=>{
      if(x.h) return;
      
      ctx.font = (W < 500 ? "15px" : "20px") + " Arial";
      let textW = ctx.measureText(x.t).width;
      let cardW = Math.max(95, textW + 40);
      let cardH = 46;
      x.ww = cardW;
      
      if(bb.x > x.x && bb.x < x.x + cardW && bb.y > x.y && bb.y < x.y + cardH){
        if(x.o === exp){
          x.h = true; 
          exp++; 
          combo++; 
          score += 20 + combo;
          addParticles(bb.x, bb.y, '#2d7');
          AudioSys.play('correct');
          
          triggerComboText(combo);
          
          let ri = rolei(x.r); 
          if(ri >= 0) document.getElementById('s' + ri).classList.add('done');
          
          if(exp === w.length){
            score += 100;
            
            // 【修正】次の英文をロードする前に現在の英文を音声読み上げする
            let unit = UNIT_DATA[currentUnitIdx];
            let currentSentenceData = unit.data[idx % unit.data.length].c;
            
            speakSentence(currentSentenceData, () => {
              // 読み上げが完了した後に実行されるコールバック処理
              idx++;
              let currentUnit = UNIT_DATA[currentUnitIdx];
              if(idx >= currentUnit.data.length) {
                StampSys.unlock(currentUnitIdx);
                AudioSys.play('clear');
                
                if(currentUnitIdx < UNIT_DATA.length - 1) {
                  systemText = { txt: "Unit Clear!", timer: 90 };
                  currentUnitIdx++;
                  idx = 0;
                } else {
                  systemText = { txt: "All Units Clear!", timer: 120 };
                  currentUnitIdx = 0;
                  idx = 0;
                }
              }
              load();
            });
          }
        } else {
          AudioSys.play('wrong');
          addParticles(bb.x, bb.y, '#f33');
          life--; 
          combo = 0;
        }
        b.splice(bi, 1);
      }
    });
  });
  
  b = b.filter(x => x.y > 0);
  
  particles.forEach(pt => {
    pt.x += pt.vx;
    pt.y += pt.vy;
    pt.alpha -= 0.02;
  });
  particles = particles.filter(pt => pt.alpha > 0);
  
  if(comboText.timer > 0) comboText.timer--;
  if(systemText.timer > 0) systemText.timer--;
  
  if(life <= 0){
    run=false;
    AudioSys.play('wrong');
    localStorage.setItem('moi_best', Math.max(score, +(localStorage.getItem('moi_best')||0)));
    setTimeout(() => { location.reload(); }, 1000);
  }
  
  document.getElementById('unit-display').textContent = (currentUnitIdx + 1) + " (" + UNIT_DATA[currentUnitIdx].name + ")";
  document.getElementById('score').textContent = score;
  document.getElementById('combo').textContent = combo;
  document.getElementById('life').textContent = life;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  if(!run || !p) return;
  
  ctx.strokeStyle = "rgba(22, 35, 58, 0.4)";
  ctx.lineWidth = 1;
  for(let x = 0; x < W; x += 50) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  
  ctx.font = (W < 500 ? "15px" : "20px") + " Arial";
  w.forEach(x=>{
    if(x.h)return;
    
    let textW = ctx.measureText(x.t).width;
    let cardW = Math.max(95, textW + 40);
    let cardH = 46;
    x.ww = cardW;
    
    ctx.fillStyle = "#12223c";
    ctx.fillRect(x.x, x.y, cardW, cardH);
    
    // 【修正】緑色の「正解枠線ヒント」を完全廃止。
    // すべて同じ通常の青色枠線に統一し、ユーザーが品詞を自発的に考えて選ぶように変更。
    ctx.strokeStyle = "#47a";
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x.x, x.y, cardW, cardH);
    
    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(x.t, x.x + (cardW / 2), x.y + (cardH / 2) + 1);
  });
  
  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
  
  b.forEach(x => {
    ctx.fillStyle = "#fff";
    ctx.fillRect(x.x - 2, x.y, 4, 12);
    ctx.shadowBlur = 8; ctx.shadowColor = "yellow";
    ctx.fillStyle = "yellow";
    ctx.fillRect(x.x - 1, x.y, 2, 12);
    ctx.shadowBlur = 0;
  });
  
  ctx.fillStyle = "#6cf";
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x - 18, p.y + 22);
  ctx.lineTo(p.x + 18, p.y + 22);
  ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.fillRect(p.x - 2, p.y + 4, 4, 4);
  
  particles.forEach(pt => {
    ctx.fillStyle = pt.color;
    ctx.globalAlpha = pt.alpha;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1.0;
  
  if(comboText.timer > 0) {
    ctx.save();
    ctx.translate(W / 2, H / 2 - 30);
    let progress = (60 - comboText.timer) / 60;
    let currentScale = comboText.scale * (1 + Math.sin(progress * Math.PI) * 0.15);
    ctx.scale(currentScale, currentScale);
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = "bold 24px Arial";
    
    ctx.fillStyle = "#000";
    ctx.fillText(comboText.txt, 2, 2);
    ctx.fillStyle = "#fa0";
    ctx.fillText(comboText.txt, 0, 0);
    ctx.restore();
  }
  
  if(systemText.timer > 0) {
    ctx.save();
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = "bold 36px 'Courier New', Arial, sans-serif";
    
    ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
    ctx.fillRect(0, H/2 - 40, W, 80);
    
    ctx.fillStyle = "#2d7";
    ctx.shadowBlur = 15; ctx.shadowColor = "#2d7";
    ctx.fillText(systemText.txt, W / 2, H / 2);
    ctx.restore();
  }
}

(function loop(){update();draw();requestAnimationFrame(loop)})();
resize();

StampSys.load();
document.getElementById('best').textContent = "Best Score: " + (localStorage.getItem('moi_best') || 0);

document.addEventListener('touchstart', (e) => {
  if (e.touches.length > 1) {
    e.preventDefault();
  }
}, { passive: false });

let lastTouchTime = 0;
document.addEventListener('touchend', (e) => {
  const now = (new Date()).getTime();
  if (now - lastTouchTime <= 300) {
    e.preventDefault();
  }
  lastTouchTime = now;
}, { passive: false });
</script>
