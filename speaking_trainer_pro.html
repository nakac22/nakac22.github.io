<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaking Trainer Pro</title>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
background:#f4f7fb;
padding:20px;
color:#222;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:white;
padding:18px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
}

label{
font-weight:600;
display:block;
margin-bottom:6px;
}

select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin:4px;
}

.primary{
background:#2563eb;
color:white;
}

.green{
background:#16a34a;
color:white;
}

.orange{
background:#ea580c;
color:white;
}

.gray{
background:#64748b;
color:white;
}

.red{
background:#dc2626;
color:white;
}

.question{
font-size:1.2rem;
line-height:1.6;
margin-bottom:12px;
}

.status{
font-size:.9rem;
color:#666;
margin-top:8px;
}

.answer{
min-height:100px;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
background:#fafafa;
white-space:pre-wrap;
}

.feedback{
line-height:1.8;
white-space:pre-wrap;
}

.hidden{
display:none;
}

.big{
font-size:1.15rem;
font-weight:bold;
}

.center{
text-align:center;
}

hr{
margin:15px 0;
}
</style>
</head>
<body>

<div class="container">

<h1>🎤 Speaking Trainer Pro</h1>

<div class="card">
<div class="grid">

<div>
<label>利用目的</label>
<select id="exam">
<option>中学校英語</option>
<option>高校入試</option>
<option>英検</option>
<option>TOEIC Speaking</option>
<option>TOEFL iBT</option>
<option>IELTS</option>
<option>教員採用試験</option>
<option>学会発表・質疑応答</option>
<option>AIお任せ</option>
</select>
</div>

<div>
<label>トピック</label>
<select id="topic">
<option>学校</option>
<option>旅行</option>
<option>食べ物</option>
<option>環境</option>
<option>将来の夢</option>
<option>趣味</option>
<option>AI</option>
<option>教育</option>
<option>国際交流</option>
<option>学会発表</option>
<option>AIお任せ</option>
</select>
</div>

<div>
<label>学習者タイプ</label>
<select id="learner">
<option>英語が苦手</option>
<option>英語を話すのが怖い</option>
<option>面接が苦手</option>
<option>即興応答が苦手</option>
<option>語彙不足</option>
<option>文法ミスが多い</option>
<option>高得点を目指したい</option>
</select>
</div>

<div>
<label>モード</label>
<select id="mode">
<option>練習</option>
<option>本番</option>
<option>フィードバック重視</option>
</select>
</div>

</div>

<div class="center" style="margin-top:15px;">
<button class="primary" onclick="startSession()">開始</button>
<button class="gray" onclick="showHint()">日本語ヒント</button>
<button class="orange" onclick="showModel()">模範解答</button>
<button class="green" onclick="speakQuestion()">問題を読む</button>
<button class="red" onclick="finishInterview()">終了</button>
</div>
</div>

<div class="card">
<div class="big">質問</div>
<hr>
<div id="question" class="question">
開始ボタンを押してください。
</div>
<div id="status" class="status"></div>
</div>

<div class="card">
<div class="big">回答（音声入力対応）</div>
<hr>

<div class="center">
<button class="green" onclick="startRecognition()">🎙️ 音声入力開始</button>
<button class="red" onclick="stopRecognition()">停止</button>
</div>

<br>

<div id="answer" class="answer"></div>

</div>

<div class="card hidden" id="hintCard">
<div class="big">日本語ヒント</div>
<hr>
<div id="hint"></div>
</div>

<div class="card hidden" id="modelCard">
<div class="big">模範解答</div>
<hr>
<div id="model"></div>
</div>

<div class="card hidden" id="feedbackCard">
<div class="big">総合フィードバック</div>
<hr>
<div id="feedback" class="feedback"></div>
</div>

</div>

<script>

const database = {

school:[
{
q:"What subject do you like the most?",
hint:"好きな教科と理由を1つ述べる。",
model:"I like English the most because I enjoy communicating with people."
},
{
q:"Tell me about your school life.",
hint:"部活動や友達について話す。",
model:"I enjoy school life because I have good friends and helpful teachers."
}
],

travel:[
{
q:"Where would you like to travel in the future?",
hint:"国名＋理由。",
model:"I would like to visit Canada because I love nature."
},
{
q:"What is the best trip you have taken?",
hint:"場所と感想。",
model:"My best trip was to Kyoto. The temples were beautiful."
}
],

food:[
{
q:"What food do you recommend?",
hint:"料理名＋理由。",
model:"I recommend sushi because it is healthy and delicious."
},
{
q:"Do you cook at home?",
hint:"Yes/No＋理由。",
model:"Yes, I do. I sometimes cook simple meals."
}
],

environment:[
{
q:"How can we protect the environment?",
hint:"できることを1つ。",
model:"We can reduce plastic use and recycle more."
}
],

dream:[
{
q:"What do you want to do in the future?",
hint:"将来の夢。",
model:"I want to become an English teacher."
}
],

hobby:[
{
q:"What do you do in your free time?",
hint:"趣味について。",
model:"I usually watch movies and read books."
}
],

ai:[
{
q:"How will AI change education?",
hint:"教育への影響。",
model:"AI will help students learn more efficiently."
}
],

education:[
{
q:"Why is learning English important?",
hint:"理由を1つ。",
model:"English helps us communicate with people around the world."
}
],

international:[
{
q:"Would you like to study abroad?",
hint:"Yes/No＋理由。",
model:"Yes. I want to experience another culture."
}
],

conference:[
{
q:"Could you summarize your research briefly?",
hint:"研究目的と結果。",
model:"This study examined language learning and found positive effects."
},
{
q:"What is the significance of your study?",
hint:"研究の意義。",
model:"It provides practical implications for language education."
}
]

};

let recognition;
let answers=[];
let currentQuestion={};

function randomItem(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function getTopicKey(){

const topic=document.getElementById("topic").value;

if(topic==="学校") return "school";
if(topic==="旅行") return "travel";
if(topic==="食べ物") return "food";
if(topic==="環境") return "environment";
if(topic==="将来の夢") return "dream";
if(topic==="趣味") return "hobby";
if(topic==="AI") return "ai";
if(topic==="教育") return "education";
if(topic==="国際交流") return "international";
if(topic==="学会発表") return "conference";

const keys=Object.keys(database);
return randomItem(keys);

}

function startSession(){

document.getElementById("feedbackCard").classList.add("hidden");

const key=getTopicKey();

currentQuestion=randomItem(database[key]);

document.getElementById("question").textContent=currentQuestion.q;

document.getElementById("status").textContent=
"1問のみ表示中。40語以内で回答してください。";

document.getElementById("answer").textContent="";

document.getElementById("hintCard").classList.add("hidden");
document.getElementById("modelCard").classList.add("hidden");

speakQuestion();

}

function speakQuestion(){

const q=document.getElementById("question").textContent;

if('speechSynthesis' in window){

speechSynthesis.cancel();

const utter=
new SpeechSynthesisUtterance(q);

utter.lang="en-US";
utter.rate=1;

speechSynthesis.speak(utter);

}

}

function showHint(){

if(!currentQuestion.hint) return;

document.getElementById("hintCard").classList.remove("hidden");
document.getElementById("hint").textContent=currentQuestion.hint;

}

function showModel(){

if(!currentQuestion.model) return;

document.getElementById("modelCard").classList.remove("hidden");
document.getElementById("model").textContent=currentQuestion.model;

}

function startRecognition(){

const SR=
window.SpeechRecognition||
window.webkitSpeechRecognition;

if(!SR){

alert("このブラウザは音声入力に対応していません。");
return;

}

recognition=new SR();

recognition.lang="en-US";
recognition.interimResults=false;
recognition.continuous=false;

recognition.onresult=function(e){

const text=e.results[0][0].transcript;

document.getElementById("answer").textContent=text;

answers.push(text);

};

recognition.start();

}

function stopRecognition(){

if(recognition){
recognition.stop();
}

}

function finishInterview(){

const learner=document.getElementById("learner").value;
const mode=document.getElementById("mode").value;

let totalWords=0;

answers.forEach(a=>{
totalWords+=a.split(/\s+/).length;
});

let msg="";

msg+="評価\n\n";

if(totalWords===0){

msg+="回答が記録されていません。\n";

}else{

msg+="発話量: 良好\n";

if(totalWords<20){
msg+="語数を少し増やしましょう。\n";
}else{
msg+="十分な語数です。\n";
}

}

msg+="\n";

if(learner==="語彙不足"){
msg+="語彙を増やすと表現力が向上します。\n";
}

if(learner==="文法ミスが多い"){
msg+="短く正確な文を意識しましょう。\n";
}

if(learner==="英語を話すのが怖い"){
msg+="完璧さより伝えることを優先しましょう。\n";
}

if(mode==="フィードバック重視"){
msg+="理由を添えて答える練習を増やしましょう。\n";
}

msg+="\n推奨:\n";
msg+="・結論→理由→例\n";
msg+="・40語以内\n";
msg+="・質問に直接答える\n";

document.getElementById("feedbackCard")
.classList.remove("hidden");

document.getElementById("feedback")
.textContent=msg;

}

</script>

</body>
</html>
