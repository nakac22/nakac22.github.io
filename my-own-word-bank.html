<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Own Word Bank 〜自分事化・文脈別例文生成〜</title>
    <style>
        :root {
            --navy: #243447;
            --green: #3f6b5a;
            --light: #f8f9fa;
            --border: #dcdcdc;
            --text: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Hiragino Sans", "Yu Gothic", "YuGothic", sans-serif;
            color: var(--text);
            line-height: 1.6;
            background-color: #f0f4f8;
            padding: 20px 10px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 1.6rem;
            color: var(--navy);
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--green);
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .api-box {
            background: #fffbf0;
            border: 1px solid #f5e6c4;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .api-box p {
            font-size: 0.8rem;
            margin-bottom: 6px;
            color: #7c5e10;
            font-weight: bold;
        }

        .api-input-group {
            display: flex;
            gap: 8px;
        }

        input[type="password"], input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-navy {
            background-color: var(--navy);
            color: white;
        }

        .btn-navy:hover {
            background-color: #1a2635;
        }

        .btn-green {
            background-color: var(--green);
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            margin-top: 15px;
        }

        .btn-green:hover {
            background-color: #2f5244;
        }

        .btn-green:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: var(--navy);
            font-size: 0.95rem;
        }

        .radio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
            background: #fff;
        }

        .radio-label input {
            display: none;
        }

        .radio-label:hover {
            background: #f7fafc;
        }

        .radio-label.selected {
            border-color: var(--green);
            background-color: #f0f7f4;
            color: var(--green);
        }

        /* 結果表示エリア */
        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            background: #f8fafc;
            border-left: 5px solid var(--navy);
            display: none;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .word-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--navy);
        }

        .btn-audio {
            background: #edf2f7;
            color: var(--navy);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .btn-audio:hover {
            background: #e2e8f0;
        }

        .sentence-eng {
            font-size: 1.2rem;
            font-weight: bold;
            color: #1a202c;
            margin-bottom: 8px;
        }

        .sentence-jpn {
            font-size: 0.95rem;
            color: #4a5568;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
            font-weight: bold;
            color: var(--green);
        }

        /* 蓄積貯金箱（Word Bank）のスタイル */
        .bank-section {
            margin-top: 35px;
            border-top: 2px dashed var(--border);
            padding-top: 25px;
        }

        .bank-title {
            font-size: 1.2rem;
            color: var(--navy);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bank-count {
            font-size: 0.9rem;
            background: var(--green);
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
        }

        .bank-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bank-card {
            background: #fafafa;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            transition: 0.2s;
            position: relative;
        }

        .bank-card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            background: #fff;
        }

        .bank-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .bank-word {
            font-weight: bold;
            color: var(--navy);
            font-size: 1.1rem;
        }

        .bank-tag {
            font-size: 0.75rem;
            background: #e2e8f0;
            color: #4a5568;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .bank-eng {
            font-size: 1rem;
            color: #2d3748;
            font-weight: 600;
            padding-right: 40px; /* スピーカーボタンとかぶらないように */
        }

        .bank-jpn {
            font-size: 0.85rem;
            color: #718096;
            margin-top: 4px;
        }

        .bank-audio-btn {
            position: absolute;
            right: 15px;
            bottom: 15px;
            width: 34px;
            height: 34px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>My Own Word Bank</h1>
    <div class="subtitle">〜自分事化・文脈別例文生成〜</div>

    <!-- APIキー設定エリア -->
    <div class="api-box">
        <p>🔑 Gemini APIキーを設定（ブラウザに安全に保存されます）</p>
        <div class="api-input-group">
            <input type="password" id="apiKey" placeholder="AIzaSyから始まるキーを入力">
            <button class="btn-navy" onclick="saveApiKey()">保存</button>
        </div>
    </div>

    <!-- 入力フォーム -->
    <div class="form-group">
        <label for="wordInput">英単語 / 熟語</label>
        <input type="text" id="wordInput" placeholder="例: alternative, look forward to">
    </div>

    <div class="form-group">
        <label>文脈・テーマ（主語は自動的に I や my になります）</label>
        <div class="radio-grid">
            <div class="radio-label selected" onclick="selectTheme(this, '日常・プライベート')">
                <input type="radio" name="theme" value="日常・プライベート" checked>日常生活
            </div>
            <div class="radio-label" onclick="selectTheme(this, 'ファッション・買い物')">
                <input type="radio" name="theme" value="ファッション・買い物">ファッション
            </div>
            <div class="radio-label" onclick="selectTheme(this, 'スポーツ・野球・フィットネス')">
                <input type="radio" name="theme" value="スポーツ・野球・フィットネス">スポーツ
            </div>
            <div class="radio-label" onclick="selectTheme(this, '大学生活・学業・ゼミ')">
                <input type="radio" name="theme" value="大学生活・学業・ゼミ">大学・学業
            </div>
            <div class="radio-label" onclick="selectTheme(this, 'ビジネス・将来のキャリア')">
                <input type="radio" name="theme" value="ビジネス・将来のキャリア">ビジネス・将来
            </div>
            <div class="radio-label" onclick="selectTheme(this, '社会問題・批判的思考')">
                <input type="radio" name="theme" value="社会問題・批判的思考">社会・ニュース
            </div>
        </div>
    </div>

    <button class="btn-green" id="generateBtn" onclick="generateSentence()">生きた例文を生成する</button>

    <!-- ローディング -->
    <div class="loading" id="loading">AIがあなたの文脈に合わせて例文を構築中...</div>

    <!-- 最新の結果表示 -->
    <div class="result-box" id="resultBox">
        <div class="result-header">
            <div class="word-title" id="resWord"></div>
            <button class="btn-audio" id="resAudioBtn" onclick="speakText()">🔊</button>
        </div>
        <div class="sentence-eng" id="resEng"></div>
        <div class="sentence-jpn" id="resJpn"></div>
    </div>

    <!-- 蓄積貯金箱（Word Bank）エリア -->
    <div class="bank-section">
        <div class="bank-title">
            <span>🫙 わたしの言葉の貯金箱（ストック履歴）</span>
            <span class="bank-count" id="bankCount">0 words</span>
        </div>
        <div class="bank-list" id="bankList">
            <!-- ここに自動でカードが追加されます -->
        </div>
    </div>
</div>

<script>
    let savedTargetEng = "";
    let wordBank = [];

    // 起動時にAPIキーと過去のストック履歴をローカルストレージから読み込む
    window.onload = function() {
        const key = localStorage.getItem("gemini_api_key");
        if (key) {
            document.getElementById("apiKey").value = key;
        }
        
        const storedBank = localStorage.getItem("my_own_word_bank_data");
        if (storedBank) {
            wordBank = JSON.parse(storedBank);
            updateBankDisplay();
        }
    };

    function saveApiKey() {
        const key = document.getElementById("apiKey").value.trim();
        if (key) {
            localStorage.setItem("gemini_api_key", key);
            alert("APIキーをブラウザに保存しました！");
        } else {
            alert("キーを入力してください。");
        }
    }

    function selectTheme(element, value) {
        document.querySelectorAll('.radio-label').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
        const radio = element.querySelector('input[type="radio"]');
        radio.checked = true;
    }

    // Gemini API 呼び出しの共通化（3.5-flash -> 3.1-flash-lite）
    async function callGeminiApi(apiKey, prompt) {
        const models = [
            'gemini-3.5-flash',
            'gemini-3.1-flash-lite'
        ];

        let lastError = null;

        for (const model of models) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();

                if (response.ok && data.candidates && data.candidates[0]?.content?.parts?.[0]?.text) {
                    return data.candidates[0].content.parts[0].text;
                } else {
                    const msg = data.error?.message || '不明なエラー';
                    lastError = `[${model}] ${msg}`;
                }
            } catch (e) {
                lastError = `[${model}] ${e.message}`;
            }
        }

        throw new Error(lastError || "通信に失敗しました。");
    }

    async function generateSentence() {
        const apiKey = document.getElementById("apiKey").value.trim();
        const word = document.getElementById("wordInput").value.trim();
        const theme = document.querySelector('input[name="theme"]:checked').value;

        if (!apiKey) {
            alert("先にAPIキーを設定・保存してください。");
            return;
        }
        if (!word) {
            alert("英単語または熟語を入力してください。");
            return;
        }

        // 画面表示の制御
        document.getElementById("generateBtn").disabled = true;
        document.getElementById("loading").style.display = "block";
        document.getElementById("resultBox").style.display = "none";

        // 認知言語学・社会言語学に立脚した「自分事化（イベント構築）」を促すプロンプト
        const prompt = `与えられた英単語（または熟語）を使って、指定されたテーマ・文脈に合致し、かつ学習者自身が「自分事」としてリアルに発話・想像できる自然な英語の例文を1つ作成してください。

【厳格なルール】
1. 例文の主語は、必ず「I」または「my」から始めてください。伝統的な文法書にあるような、誰のセリフか分からない無味乾燥な三人称の例文は絶対に避けてください。
2. 指定されたテーマの文脈において、日常的あるいは知的に本当に使われそうな生きた表現にしてください。
3. 出力フォーマットは必ず以下のJSON形式のみとし、余計な解説は一切含めないでください。

【入力情報】
単語: ${word}
テーマ: ${theme}

【出力フォーマット】
{
  "english": "作成した英語の例文（主語はIまたはmy）",
  "japanese": "その和訳"
}`;

        try {
            const jsonText = await callGeminiApi(apiKey, prompt);
            const cleanJsonText = jsonText.replace(/```json|```/g, '').trim();
            const res = JSON.parse(cleanJsonText);

            // 最新結果のセット
            document.getElementById("resWord").innerText = word;
            document.getElementById("resEng").innerText = res.english;
            document.getElementById("resJpn").innerText = res.japanese;
            savedTargetEng = res.english;

            document.getElementById("resultBox").style.display = "block";

            // 音声の自動再生
            speakText();

            // 🫙 貯金箱（Word Bank）への追加処理
            const newRecord = {
                id: Date.now(),
                word: word,
                theme: theme.split('・')[0], // 表示用に短いタグにする
                english: res.english,
                japanese: res.japanese
            };
            
            // 先頭に追加（最新が上に来る）
            wordBank.unshift(newRecord);
            localStorage.setItem("my_own_word_bank_data", JSON.stringify(wordBank));
            updateBankDisplay();

            // 入力欄をクリアして次の入力を快適に
            document.getElementById("wordInput").value = "";

        } catch (error) {
            console.error(error);
            alert("エラーが発生しました:\n" + error.message);
        } finally {
            document.getElementById("generateBtn").disabled = false;
            document.getElementById("loading").style.display = "none";
        }
    }

    // メイン結果用の音声再生
    function speakText() {
        if (!savedTargetEng) return;
        window.speechSynthesis.cancel(); // 再生中の音声をクリア
        const utterance = new SpeechSynthesisUtterance(savedTargetEng);
        utterance.lang = "en-US";
        utterance.rate = 0.95; // 聞き取りやすいよう、ごくわずかにゆっくり
        window.speechSynthesis.speak(utterance);
    }

    // 🫙 過去のストック（履歴カード）から個別に音声を再生する関数
    function speakStockText(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "en-US";
        utterance.rate = 0.95;
        window.speechSynthesis.speak(utterance);
    }

    // 貯金箱の表示更新
    function updateBankDisplay() {
        const listEl = document.getElementById("bankList");
        const countEl = document.getElementById("bankCount");
        
        countEl.innerText = `${wordBank.length} words`;
        listEl.innerHTML = "";

        if (wordBank.length === 0) {
            listEl.innerHTML = `<div style="text-align:center; color:#94a3b8; font-size:0.9rem; padding:20px;">まだ言葉の貯金がありません。上のフォームから生成してみましょう！</div>`;
            return;
        }

        wordBank.forEach(item => {
            const card = document.createElement("div");
            card.className = "bank-card";
            
            // 特殊文字のバグを防ぐエスケープ処理をして引数に渡す
            const escapedEng = item.english.replace(/'/g, "\\'").replace(/"/g, '\\"');

            card.innerHTML = `
                <div class="bank-card-header">
                    <span class="bank-word">${item.word}</span>
                    <span class="bank-tag">${item.theme}</span>
                </div>
                <div class="bank-eng">${item.english}</div>
                <div class="bank-jpn">${item.japanese}</div>
                <button class="btn-audio bank-audio-btn" onclick="speakStockText('${escapedEng}')">🔊</button>
            `;
            listEl.appendChild(card);
        });
    }
</script>

</body>
</html>
